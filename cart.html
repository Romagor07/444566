<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - Формула здоровья</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .cart-page { padding: 30px 0 60px; min-height: 100vh; }
        .cart-title { font-size: 32px; font-weight: 800; color: #46211A; margin-bottom: 30px; }
        .cart-container { display: grid; grid-template-columns: 1fr 380px; gap: 40px; }
        .cart-items { background: white; border-radius: 24px; padding: 20px; }
        .cart-item { display: flex; align-items: center; gap: 20px; padding: 15px 0; border-bottom: 1px solid #e8ddd7; }
        .cart-item-img { width: 100px; height: 100px; background: #f9f6f3; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .cart-item-img img { max-width: 80px; max-height: 80px; object-fit: contain; }
        .cart-item-info { flex: 1; }
        .cart-item-title { font-size: 18px; font-weight: 700; color: #46211A; }
        .cart-item-price { font-size: 20px; font-weight: 800; color: #64b61a; }
        .cart-item-quantity { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        .qty-btn { background: #f0ece9; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .qty-btn:hover { background: #e8be52; }
        .cart-item-remove { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 18px; padding: 10px; }
        .cart-summary { background: white; border-radius: 24px; padding: 25px; position: sticky; top: 180px; height: fit-content; }
        .summary-row { display: flex; justify-content: space-between; padding: 10px 0; }
        .summary-total { display: flex; justify-content: space-between; font-size: 20px; font-weight: 800; color: #46211A; border-top: 2px solid #64b61a; margin-top: 15px; padding-top: 15px; }
        .checkout-link { display: block; text-align: center; background: #64b61a; color: white; text-decoration: none; padding: 14px; border-radius: 50px; font-weight: 600; margin-top: 20px; transition: 0.2s; }
        .checkout-link:hover { background: #4d8e14; transform: translateY(-2px); }
        .cart-empty { text-align: center; padding: 60px; background: white; border-radius: 24px; }
        @media (max-width: 992px) { .cart-container { grid-template-columns: 1fr; } .cart-summary { position: static; margin-top: 30px; } }
        @media (max-width: 768px) { .cart-page { padding: 100px 0 40px; } .cart-item { flex-wrap: wrap; } }
    </style>
</head>
<body>

<div id="header-placeholder"></div>
<div class="header-spacer-only-mobile"></div>

<main class="cart-page">
    <div class="container">
        <h1 class="cart-title">Корзина</h1>
        <div id="cartContent"></div>
    </div>
</main>

<div id="footer-placeholder"></div>

<script src="script.js"></script>
<script>
    // Проверка авторизации
    if (!currentUser) {
        window.location.href = 'login.html';
    }
    
    // Функция обновления количества товара
    function updateQuantityInCart(productId, delta) {
        const itemIndex = cart.findIndex(i => i.id === productId);
        if (itemIndex !== -1) {
            const newQuantity = (cart[itemIndex].quantity || 1) + delta;
            if (newQuantity >= 1) {
                cart[itemIndex].quantity = newQuantity;
                saveCart();
                renderCartContent();
                updateCartBadge();
            }
        }
    }
    
    // Функция удаления товара из корзины
    function removeFromCartList(productId) {
        cart = cart.filter(i => i.id !== productId);
        saveCart();
        renderCartContent();
        updateCartBadge();
        
        // Обновляем популярные товары если они есть на странице
        if (typeof window.renderPopularGoods === 'function') {
            window.renderPopularGoods();
        }
    }
    
    // Функция отображения корзины
    function renderCartContent() {
        const container = document.getElementById('cartContent');
        if (!container) return;
        
        // Обновляем cart из localStorage на всякий случай
        if (currentUser && currentUser.email) {
            const savedCart = localStorage.getItem(`cart_${currentUser.email}`);
            if (savedCart) {
                cart = JSON.parse(savedCart);
            }
        }
        
        if (!cart.length) {
            container.innerHTML = `
                <div class="cart-empty">
                    <i class="fas fa-shopping-cart" style="font-size:80px;color:#e0d6d0;margin-bottom:20px;"></i>
                    <p>Ваша корзина пуста</p>
                    <a href="cabinet.html" class="btn-shop">Перейти к покупкам</a>
                </div>
            `;
            return;
        }
        
        let subtotal = 0;
        const itemsHtml = cart.map(item => {
            const qty = item.quantity || 1;
            const itemTotal = item.price * qty;
            subtotal += itemTotal;
            return `
                <div class="cart-item">
                    <div class="cart-item-img">
                        <img src="${item.image || 'images/placeholder.webp'}" onerror="this.parentElement.innerHTML='📦'">
                    </div>
                    <div class="cart-item-info">
                        <div class="cart-item-title">${escapeHtml(item.name)}</div>
                        <div class="cart-item-price">${item.price.toLocaleString()} ₽</div>
                        <div class="cart-item-quantity">
                            <button class="qty-btn minus-btn" data-id="${item.id}" data-delta="-1">-</button>
                            <span>${qty}</span>
                            <button class="qty-btn plus-btn" data-id="${item.id}" data-delta="1">+</button>
                        </div>
                    </div>
                    <button class="cart-item-remove" data-id="${item.id}">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `;
        }).join('');
        
        container.innerHTML = `
            <div class="cart-container">
                <div class="cart-items">
                    ${itemsHtml}
                </div>
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Товары (${cart.length})</span>
                        <span>${subtotal.toLocaleString()} ₽</span>
                    </div>
                    <div class="summary-total">
                        <span>Итого</span>
                        <span>${subtotal.toLocaleString()} ₽</span>
                    </div>
                    <a href="checkout.html" class="checkout-link">Перейти к оформлению →</a>
                </div>
            </div>
        `;
        
        // Добавляем обработчики событий
        document.querySelectorAll('.minus-btn, .plus-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const delta = parseInt(btn.dataset.delta);
                updateQuantityInCart(btn.dataset.id, delta);
            });
        });
        
        document.querySelectorAll('.cart-item-remove').forEach(btn => {
            btn.addEventListener('click', () => {
                removeFromCartList(btn.dataset.id);
            });
        });
    }
    
    // Загружаем корзину при загрузке страницы
    document.addEventListener('DOMContentLoaded', () => {
        // Ждем пока загрузится шапка и данные пользователя
        setTimeout(() => {
            renderCartContent();
        }, 100);
    });
    
    // Делаем функцию глобальной для обновления из других мест
    window.renderCartContent = renderCartContent;
</script>
</body>
</html>
