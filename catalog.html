<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Каталог - Формула здоровья</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .catalog-page { padding: 30px 0 60px; background: #fff; min-height: 100vh; }
        .catalog-page-header { text-align: center; margin-bottom: 50px; }
        .catalog-page-header h1 { font-size: 42px; font-weight: 800; color: #46211A; margin-bottom: 15px; }
        .category-section { margin-top: 40px; }
        .category-section:first-child { margin-top: 0; }
        .category-title { font-size: 28px; font-weight: 700; color: #46211A; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #64b61a; display: inline-block; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        @media (max-width: 768px) {
            .catalog-page { padding: 30px 0 40px; }
            .catalog-page-header h1 { font-size: 32px; }
            .category-title { font-size: 22px; }
        }
    </style>
</head>
<body>

<div id="header-placeholder"></div>
<div class="header-spacer-only-mobile"></div>

<main class="catalog-page">
    <div class="container">
        <div class="catalog-page-header">
            <h1>Каталог</h1>
        </div>

        <div class="category-section">
            <h2 class="category-title"><i class="fas fa-heartbeat" style="color:#64b61a;margin-right:8px;"></i>Здоровье</h2>
            <div class="products-grid" id="healthGrid"></div>
        </div>

        <div class="category-section">
            <h2 class="category-title"><i class="fas fa-spa" style="color:#64b61a;margin-right:8px;"></i>Красота</h2>
            <div class="products-grid" id="beautyGrid"></div>
        </div>

        <div class="category-section">
            <h2 class="category-title"><i class="fas fa-microchip" style="color:#64b61a;margin-right:8px;"></i>Приборы / Аксессуары</h2>
            <div class="products-grid" id="devicesGrid"></div>
        </div>
    </div>
</main>

<div id="footer-placeholder"></div>

<script src="script.js"></script>
<script>
    renderProductsGrid('healthGrid', allProducts.filter(p => p.category === 'health'));
    renderProductsGrid('beautyGrid', allProducts.filter(p => p.category === 'beauty'));
    renderProductsGrid('devicesGrid', allProducts.filter(p => p.category === 'devices'));
</script>
</body>
</html>
