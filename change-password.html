<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смена пароля - Формула здоровья</title>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <style>
        .password-container { max-width: 500px; margin: 0 auto; padding: 100px 20px 60px; }
        .password-card { background: white; border-radius: 32px; padding: 40px; }
        h2 { text-align: center; margin-bottom: 30px; color: #46211A; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; color: #46211A; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #e0d6d0; border-radius: 12px; font-family: inherit; }
        .btn-change { width: 100%; background: #64b61a; color: white; border: none; padding: 14px; border-radius: 50px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div id="header-placeholder"></div>
<div class="header-spacer-only-mobile"></div>

<div class="password-container">
    <div class="password-card">
        <h2>Смена пароля</h2>
        <div class="form-group"><label>Текущий пароль</label><input type="password" id="oldPassword"></div>
        <div class="form-group"><label>Новый пароль</label><input type="password" id="newPassword"></div>
        <div class="form-group"><label>Подтверждение пароля</label><input type="password" id="confirmPassword"></div>
        <button class="btn-change" id="changePasswordBtn">Сменить пароль</button>
    </div>
</div>

<div id="footer-placeholder"></div>

<script src="script.js"></script>
<script>
    if (!currentUser) window.location.href = 'login.html';
    
    let users = JSON.parse(localStorage.getItem('users')) || [];
    
    document.getElementById('changePasswordBtn').addEventListener('click', () => {
        const oldPass = document.getElementById('oldPassword').value;
        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmPassword').value;
        
        if (oldPass !== currentUser.password) { alert('Неверный текущий пароль'); return; }
        if (newPass.length < 6) { alert('Новый пароль должен быть не менее 6 символов'); return; }
        if (newPass !== confirmPass) { alert('Пароли не совпадают'); return; }
        
        const userIndex = users.findIndex(u => u.email === currentUser.email);
        if (userIndex !== -1) {
            users[userIndex].password = newPass;
            localStorage.setItem('users', JSON.stringify(users));
            currentUser.password = newPass;
            sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
            alert('Пароль успешно изменен!');
            window.location.href = 'cabinet.html';
        }
    });
</script>
</body>
</html>
