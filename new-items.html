<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Новинки - Формула здоровья</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .catalog-page { padding: 30px 0 60px; background: #fff; min-height: 100vh; }
        .catalog-page-header { text-align: left; margin-bottom: 50px; }
        .catalog-page-header h1 { font-size: 42px; font-weight: 800; color: #46211A; margin-bottom: 15px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        @media (max-width: 768px) { .catalog-page { padding: 100px 0 40px; } .catalog-page-header h1 { font-size: 32px; } }
    </style>
</head>
<body>

<div id="header-placeholder"></div>

<main class="catalog-page">
    <div class="container">
        <div class="catalog-page-header">
            <h1>Новинки</h1>
        </div>
        <div class="products-grid" id="productsGrid"></div>
    </div>
</main>

<div id="footer-placeholder"></div>

<script src="script.js"></script>
<script>
    // Новинки - первые 9 товаров
    const newProducts = allProducts.slice(0, 9);
    renderProductsGrid('productsGrid', newProducts);
</script>
</body>
</html>
